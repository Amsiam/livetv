name: livetv_app
description: Live TV — watch matches and TV channels.
publish_to: 'none'
version: 1.0.6+7

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^15.1.2
  dio: ^5.8.0+1
  media_kit: ^1.2.0
  media_kit_video: ^1.3.0
  media_kit_libs_video: ^1.0.6
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  android_pip: ^2.0.2
  native_device_orientation: ^2.1.1
  screen_brightness_platform_interface: ^2.1.1
  package_info_plus: ^10.1.0
  path_provider: ^2.1.5
  firebase_core: ^4.10.0
  firebase_crashlytics: ^5.2.3
  firebase_performance: ^0.11.4+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#0D1117"
  adaptive_icon_foreground: assets/branding/app_icon.png

flutter_native_splash:
  color: "#0D1117"
  image: assets/branding/app_icon.png
  android_12:
    color: "#0D1117"
    image: assets/branding/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
