name: livetv

x-backend-common: &backend-common
  build:
    context: ../backend
    dockerfile: ../deploy/Dockerfile
  restart: unless-stopped
  env_file:
    - .env
  environment: &backend-env
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    REDIS_URL: redis://redis:6379/1
    CELERY_BROKER_URL: redis://redis:6379/0
    CELERY_RESULT_BACKEND: redis://redis:6379/0
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgres:
    container_name: livetv_postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: livetv_redis
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    container_name: livetv_web
    <<: *backend-common
    environment:
      <<: *backend-env
      GUNICORN_BIND: 0.0.0.0:8123
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media

  celery-worker:
    container_name: livetv_celery_worker
    <<: *backend-common
    entrypoint: ["uv", "run", "celery"]
    command: ["-A", "config", "worker", "-l", "info", "--concurrency=2"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started

  celery-beat:
    container_name: livetv_celery_beat
    <<: *backend-common
    entrypoint: ["uv", "run", "celery"]
    command: ["-A", "config", "beat", "-l", "info"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started

  nginx:
    container_name: livetv_nginx
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${NGINX_PUBLISH_PORT:-8134}:8134"
    volumes:
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    depends_on:
      - web

volumes:
  postgres_data:
  redis_data:
  static_data:
  media_data:
